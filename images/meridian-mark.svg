<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <clipPath id="globeClip">
      <circle cx="160" cy="160" r="90"/>
    </clipPath>

    <linearGradient id="meridianGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.42"/>
      <stop offset="50%" stop-color="#1a3a5c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0.42"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="320" height="320" fill="#ffffff"/>

  <!-- Globe fill -->
  <circle cx="160" cy="160" r="90" fill="#edf2f7"/>

  <!-- Meridian plane — narrow vertical slice, scaled to globe -->
  <ellipse cx="160" cy="160" rx="40" ry="90" fill="url(#meridianGrad)" stroke="#1a3a5c" stroke-width="2" stroke-opacity="0.88"/>

  <!-- Latitude lines clipped to globe -->
  <g clip-path="url(#globeClip)" stroke="#1a3a5c" stroke-width="0.8" stroke-opacity="0.18" fill="none">
    <ellipse cx="160" cy="160" rx="90"  ry="23"/>
    <ellipse cx="160" cy="137" rx="78"  ry="20"/>
    <ellipse cx="160" cy="114" rx="45"  ry="12"/>
    <ellipse cx="160" cy="183" rx="78"  ry="20"/>
    <ellipse cx="160" cy="206" rx="45"  ry="12"/>
  </g>

  <!-- Secondary meridian lines -->
  <g clip-path="url(#globeClip)" stroke="#1a3a5c" stroke-width="0.75" stroke-opacity="0.13" fill="none">
    <ellipse cx="160" cy="160" rx="90" ry="23" transform="rotate(55 160 160)"/>
    <ellipse cx="160" cy="160" rx="90" ry="23" transform="rotate(125 160 160)"/>
  </g>

  <!-- Globe outline -->
  <circle cx="160" cy="160" r="90" fill="none" stroke="#1a3a5c" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Polar axis — long, well beyond globe on both ends -->
  <line x1="105" y1="41" x2="215" y2="279" stroke="#1a3a5c" stroke-width="2.2" stroke-opacity="0.82"/>

  <!-- Fix point at center -->
  <circle cx="160" cy="160" r="5" fill="none" stroke="#1a3a5c" stroke-width="2" stroke-opacity="0.9"/>
  <circle cx="160" cy="160" r="2" fill="#1a3a5c" fill-opacity="0.85"/>

</svg>
